<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b1020">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Moped Navi">
  <title>Moped Navigator</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main id="app">
    <header class="topbar">
      <div>
        <h1>Moped Navigator</h1>
        <p>Für Fahrzeuge bis 50 km/h</p>
      </div>
      <button id="locateBtn" class="small-button">Standort</button>
    </header>

    <section id="searchCard" class="search-card">
      <label for="startInput">Start</label>
      <div class="input-row">
        <input id="startInput" autocomplete="off" placeholder="Standort oder Adresse">
        <button id="useLocationBtn">GPS</button>
      </div>
      <div id="startSuggestions" class="suggestions"></div>

      <label for="destinationInput">Ziel</label>
      <input id="destinationInput" autocomplete="off" placeholder="Ziel eingeben">
      <div id="destinationSuggestions" class="suggestions"></div>

      <div class="mode-row" aria-label="Routenmodus">
        <button data-mode="fast" class="mode active">Direkt</button>
        <button data-mode="safe" class="mode">Ruhiger</button>
        <button data-mode="strict50" class="mode">Bis 50</button>
      </div>
      <button id="routeBtn" class="primary">Route berechnen</button>
      <p class="warning">Beta: Kartendaten können falsch oder unvollständig sein. Beschilderung vor Ort hat immer Vorrang.</p>
    </section>

    <div id="map" aria-label="Karte"></div>

    <section id="routeSummary" class="route-summary hidden">
      <div><strong id="duration">-</strong><span>Fahrzeit</span></div>
      <div><strong id="distance">-</strong><span>Entfernung</span></div>
      <button id="startNavigationBtn" class="primary">Navigation starten</button>
    </section>

    <section id="navigationPanel" class="navigation-panel hidden">
      <div id="maneuverIcon" class="maneuver-icon straight" aria-hidden="true"></div>
      <div class="instruction-wrap">
        <span id="instructionDistance" class="instruction-distance">Route wird vorbereitet</span>
        <strong id="currentInstruction">Der Route folgen</strong>
      </div>
      <button id="stopNavigationBtn" class="stop-button">Beenden</button>
    </section>

    <section id="navigationFooter" class="navigation-footer hidden">
      <div><strong id="remainingTime">-</strong><span>Restzeit</span></div>
      <div><strong id="arrivalTime">-</strong><span>Ankunft</span></div>
      <div><strong id="remainingDistance">-</strong><span>Reststrecke</span></div>
      <div id="speedBox"><strong id="currentSpeed">0</strong><span>km/h</span></div>
      <button id="recenterBtn" class="recenter-button">Zentrieren</button>
    </section>

    <div id="status" class="status hidden" role="status"></div>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>
  <script src="./app.js"></script>
</body>
</html>
